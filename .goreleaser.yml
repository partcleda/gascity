version: 2

builds:
  - main: ./cmd/gc
    binary: gc
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Tag }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]

release:
  prerelease: auto
  replace_existing_artifacts: true

brews:
  - repository:
      owner: gastownhall
      name: homebrew-gascity
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/gastownhall/gascity
    description: "Gas City CLI — an orchestration-builder SDK for multi-agent coding workflows"
    license: "MIT"
    install: |
      bin.install "gc"
    caveats: |
      To start the Gas City supervisor now and auto-restart on login:
        brew services start gascity
    post_install: |
      # Kill any standalone supervisor so launchd takes over cleanly.
      quiet_system bin/"gc", "supervisor", "stop"
    service: |
      run [opt_bin/"gc", "supervisor", "run"]
      keep_alive true
      log_path var/"log/gascity/supervisor.log"
      error_log_path var/"log/gascity/supervisor.err.log"
      working_dir var/"lib/gascity"
    test: |
      assert_match version.to_s, shell_output("#{bin}/gc version")

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
